name: WRT-CORE

on:
  workflow_call:
    inputs:
      WRT_CONFIG:
        required: true
        type: string
      WRT_THEME:
        required: true
        type: string
      WRT_NAME:
        required: true
        type: string
      WRT_SSID:
        required: true
        type: string
      WRT_WORD:
        required: true
        type: string
      WRT_IP:
        required: true
        type: string
      WRT_PW:
        required: true
        type: string
      WRT_REPO:
        required: true
        type: string
      WRT_BRANCH:
        required: true
        type: string
      WRT_SOURCE:
        required: true
        type: string
      WRT_PACKAGE:
        required: false
        type: string
      WRT_TEST:
        required: false
        type: string

env:
  GITHUB_TOKEN: ${{secrets.GITHUB_TOKEN}}
  WRT_CONFIG: ${{inputs.WRT_CONFIG}}
  WRT_THEME: ${{inputs.WRT_THEME}}
  WRT_NAME: ${{inputs.WRT_NAME}}
  WRT_SSID: ${{inputs.WRT_SSID}}
  WRT_WORD: ${{inputs.WRT_WORD}}
  WRT_IP: ${{inputs.WRT_IP}}
  WRT_PW: ${{inputs.WRT_PW}}
  WRT_REPO: ${{inputs.WRT_REPO}}
  WRT_BRANCH: ${{inputs.WRT_BRANCH}}
  WRT_SOURCE: ${{inputs.WRT_SOURCE}}
  WRT_PACKAGE: ${{inputs.WRT_PACKAGE}}
  WRT_TEST: ${{inputs.WRT_TEST}}

jobs:
  core:
    name: ${{inputs.WRT_SOURCE}}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Projects
        uses: actions/checkout@main

      # =========================
      # 1. 初始化环境
      # =========================
      - name: Initialization Environment
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          set -e

          sudo -E apt -yqq update
          sudo -E apt -yqq full-upgrade
          sudo -E apt -yqq install dos2unix libfuse-dev

          sudo bash -c 'bash <(curl -sL https://build-scripts.immortalwrt.org/init_build_environment.sh)'

          sudo timedatectl set-timezone "Asia/Shanghai"

          sudo mkdir -p /mnt/build_wrt
          sudo chown $USER:$USER /mnt/build_wrt
          ln -s /mnt/build_wrt $GITHUB_WORKSPACE/wrt

      # =========================
      # 2. 初始化变量
      # =========================
      - name: Initialization Values
        run: |
          set -e

          echo "WRT_DATE=$(date +'%y.%m.%d-%H.%M.%S')" >> $GITHUB_ENV
          echo "WRT_MARK=${GITHUB_REPOSITORY%%/*}" >> $GITHUB_ENV
          echo "WRT_INFO=${WRT_SOURCE%%/*}" >> $GITHUB_ENV
          echo "WRT_WIFI=wifi-yes" >> $GITHUB_ENV
          echo "WRT_KVER=none" >> $GITHUB_ENV
          echo "WRT_LIST=none" >> $GITHUB_ENV

      # =========================
      # 3. 拉源码
      # =========================
      - name: Clone Code
        run: |
          set -e

          git clone --depth=1 --single-branch --branch $WRT_BRANCH $WRT_REPO ./wrt/

          cd ./wrt/
          echo "WRT_HASH=$(git rev-parse --short HEAD)" >> $GITHUB_ENV

      # =========================
      # 4. 安全 Feed 注入（重点优化）
      # =========================
      - name: Add Feeds (Stable)
        run: |
          set -e
          cd ./wrt/

          touch feeds.conf.default

          grep -q "passwall" feeds.conf.default || echo 'src-git passwall https://github.com/xiaorouji/openwrt-passwall.git' >> feeds.conf.default
          grep -q "passwall_packages" feeds.conf.default || echo 'src-git passwall_packages https://github.com/xiaorouji/openwrt-passwall-packages.git' >> feeds.conf.default

          grep -q "homeproxy" feeds.conf.default || echo 'src-git homeproxy https://github.com/immortalwrt/homeproxy.git' >> feeds.conf.default
          grep -q "oaf" feeds.conf.default || echo 'src-git oaf https://github.com/destan19/OpenAppFilter.git' >> feeds.conf.default
          grep -q "gecoosac" feeds.conf.default || echo 'src-git gecoosac https://github.com/gecoosac/luci-app-gecoosac.git' >> feeds.conf.default

          grep -q "kenzo" feeds.conf.default || echo 'src-git kenzo https://github.com/kenzok8/openwrt-packages.git' >> feeds.conf.default

      # =========================
      # 5. 更新 feeds
      # =========================
      - name: Update Feeds
        run: |
          set -e
          cd ./wrt/

          ./scripts/feeds update -a
          ./scripts/feeds install -a

      # =========================
      # 6. 包 & 脚本
      # =========================
      - name: Custom Packages
        run: |
          set -e
          cd ./wrt/package/

          bash $GITHUB_WORKSPACE/Scripts/Packages.sh
          bash $GITHUB_WORKSPACE/Scripts/Handles.sh

      # =========================
      # 7. 配置
      # =========================
      - name: Custom Settings
        run: |
          set -e
          cd ./wrt/

          cat $GITHUB_WORKSPACE/Config/$WRT_CONFIG.txt > .config

          if [[ "${WRT_CONFIG,,}" != *"test"* ]]; then
            cat $GITHUB_WORKSPACE/Config/GENERAL.txt >> .config
          fi

          bash $GITHUB_WORKSPACE/Scripts/Settings.sh

          make defconfig

      # =========================
      # 8. 下载依赖
      # =========================
      - name: Download Packages
        if: env.WRT_TEST != 'true'
        run: |
          set -e
          cd ./wrt/
          make download -j$(nproc)

      # =========================
      # 9. 编译
      # =========================
      - name: Compile Firmware
        if: env.WRT_TEST != 'true'
        run: |
          set -e
          cd ./wrt/

          make -j$(nproc) || make -j1 V=s

      # =========================
      # 10. 打包
      # =========================
      - name: Package Firmware
        run: |
          set -e
          cd ./wrt/

          mkdir -p upload

          cp .config upload/

          if [[ "$WRT_TEST" != "true" ]]; then
            find ./bin/targets/ -type f -name "*.bin" -exec mv -f {} ./upload/ \;
          fi

      # =========================
      # 11. 发布
      # =========================
      - name: Release Firmware
        uses: softprops/action-gh-release@master
        with:
          tag_name: ${{env.WRT_CONFIG}}-${{env.WRT_INFO}}-${{env.WRT_BRANCH}}-${{env.WRT_DATE}}
          files: ./wrt/upload/*
